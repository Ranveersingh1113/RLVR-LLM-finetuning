model:
  name: "Qwen/Qwen2.5-Math-7B-Instruct"
  load_in_4bit: true
  max_seq_length: 1024
  gradient_checkpointing: true

lora:
  r: 64
  lora_alpha: 64
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj
  lora_dropout: 0.0
  bias: "none"

grpo:
  num_generations: 4
  max_completion_length: 512
  learning_rate: 5.0e-6
  per_device_train_batch_size: 2
  gradient_accumulation_steps: 4
  kl_coeff: 0.01
  temperature: 0.9
  warmup_steps: 50
  max_grad_norm: 0.1
  save_steps: 250
  logging_steps: 10

phase3:
  learning_rate: 2.0e-6
  max_completion_length: 384
  reward_warmup_steps: 50
  additional_steps: 400

monitoring:
  report_to: "wandb"
  project: "rlvr-math-adaptive"
  fast_eval_every_steps: 200
  calibration_eval_every_steps: 1000

output_dir: "./checkpoints"

